name: Deploy to Aliyun OSS (China)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    # Skip until Aliyun secrets are configured in GitHub
    if: ${{ secrets.ALIYUN_OSS_BUCKET != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload dist/ to OSS
        env:
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
        run: node scripts/deploy-aliyun-oss.mjs
